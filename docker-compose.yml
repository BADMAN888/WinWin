services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: test
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    restart: always

  service-b:
    build: WinWinServiceB
    container_name: service-b
    ports:
      - "8081:8081"
    environment:
      INTERNAL_TOKEN: secret123
      SERVER_PORT: 8081
    depends_on:
      - postgres
    restart: always

  service-a:
    build: ./WinWinServiceA
    container_name: service-a
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/test
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: pass
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect

      JWT_SECRET: super-secret-key-super-secret-key-1234567890
      INTERNAL_TOKEN: secret123
      DATA_API_URL: http://service-b:8081

      SERVER_PORT: 8080
    depends_on:
      - postgres
      - service-b
    restart: always