spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/test}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:super-secret-key-super-secret-key-1234567890}
  expiration: ${JWT_EXPIRATION:86400000}

data:
  api:
    url: ${DATA_API_URL:http://localhost:8081}

internal:
  token: ${INTERNAL_TOKEN:secret123}