server:
  port: 8080

spring:
  application:
    name: auth-api

  datasource:
    url: jdbc:postgresql://localhost:5432/test
    username: user
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: secretkey123

internal:
  token: secret123